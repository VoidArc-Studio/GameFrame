<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GameFrame Configurator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="assets/logo.png" alt="GameFrame Logo" class="logo">
            <h1>GameFrame Configurator</h1>
        </header>

        <!-- System Information Dashboard -->
        <section class="system-info">
            <h2>System Dashboard</h2>
            <div class="info-grid">
                <div class="info-card">
                    <h3>GPU</h3>
                    <p id="gpu-vendor">GPU: Detecting...</p>
                </div>
                <div class="info-card">
                    <h3>CPU & Memory</h3>
                    <p id="cpu-info">CPU: Detecting...</p>
                </div>
                <div class="info-card">
                    <h3>Display</h3>
                    <p id="display-backend">Display Backend: Detecting...</p>
                    <p id="available-resolutions">Resolutions: Detecting...</p>
                    <p id="available-refresh-rates">Refresh Rates: Detecting...</p>
                </div>
            </div>
            <button id="refresh-system-info" title="Refresh system information">
                <img src="assets/icons/refresh.svg" alt="Refresh"> Refresh
            </button>
        </section>

        <!-- Configuration Form -->
        <section class="config-section">
            <h2>Configuration</h2>
            <form id="config-form">
                <div class="form-group">
                    <label for="profile" title="Select or manage configuration profiles">Config Profile:</label>
                    <div class="profile-controls">
                        <select id="profile">
                            <option value="default">Default</option>
                            <!-- Populated dynamically -->
                        </select>
                        <button type="button" id="save-profile" title="Save current settings as a new profile">
                            <img src="assets/icons/save.svg" alt="Save"> Save
                        </button>
                        <button type="button" id="load-profile" title="Load selected profile">
                            <img src="assets/icons/launch.svg" alt="Load"> Load
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="environment" title="Select the gaming environment to launch">Environment:</label>
                    <select id="environment">
                        <option value="gnome">GNOME</option>
                        <option value="kde">KDE</option>
                        <option value="steam-gamepadui">Steam GamepadUI</option>
                        <option value="heroic">Heroic</option>
                        <option value="lutris">Lutris</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="resolution" title="Screen resolution (e.g., 1920x1080)">Resolution:</label>
                    <select id="resolution">
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="refresh_rate" title="Display refresh rate in Hz">Refresh Rate (Hz):</label>
                    <select id="refresh_rate">
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="fullscreen" title="Enable fullscreen mode">Fullscreen:</label>
                    <input type="checkbox" id="fullscreen" checked>
                </div>
                <div class="form-group">
                    <label for="scaling_mode" title="Scaling mode for resolution (e.g., FSR for upscaling)">Scaling Mode:</label>
                    <select id="scaling_mode">
                        <option value="fsr">FSR (FidelityFX Super Resolution)</option>
                        <option value="bilinear">Bilinear</option>
                        <option value="nearest">Nearest Neighbor</option>
                        <option value="integer">Integer Scaling</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="hdr" title="Enable High Dynamic Range (if supported)">HDR:</label>
                    <input type="checkbox" id="hdr">
                </div>
                <div class="form-group">
                    <label for="display_backend" title="Select display backend (Wayland or X11)">Display Backend:</label>
                    <select id="display_backend">
                        <option value="wayland">Wayland</option>
                        <option value="x11">X11</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="backend" title="Rendering backend (Vulkan for modern GPUs, OpenGL for older ones)">Rendering Backend:</label>
                    <select id="backend">
                        <option value="vulkan">Vulkan</option>
                        <option value="opengl">OpenGL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vsync" title="Enable vertical sync to reduce screen tearing">VSync:</label>
                    <input type="checkbox" id="vsync" checked>
                </div>
                <div class="form-group">
                    <label for="max_fps" title="Maximum frames per second">Max FPS:</label>
                    <input type="number" id="max_fps" value="144" min="30" max="240">
                </div>
                <div class="form-group">
                    <label for="filter" title="Filtering method for rendering">Filter:</label>
                    <select id="filter">
                        <option value="bilinear">Bilinear</option>
                        <option value="nearest">Nearest Neighbor</option>
                        <option value="sharp">Sharp Bilinear</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="vendor" title="Select GPU vendor or auto-detect">GPU Vendor:</label>
                    <select id="vendor">
                        <option value="auto">Auto</option>
                        <option value="nvidia">NVIDIA</option>
                        <option value="amd">AMD</option>
                        <option value="intel">Intel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="opengl_version" title="OpenGL version for compatibility">OpenGL Version:</label>
                    <input type="text" id="opengl_version" value="2.1">
                </div>
                <div class="form-group">
                    <label for="vulkan_version" title="Vulkan version for modern GPUs">Vulkan Version:</label>
                    <input type="text" id="vulkan_version" value="1.3">
                </div>
                <div class="form-actions">
                    <button type="submit" title="Save configuration to file">Save Configuration</button>
                    <button type="button" id="launch-gameframe" title="Launch GameFrame with current settings">
                        <img src="assets/icons/launch.svg" alt="Launch"> Launch GameFrame
                    </button>
                </div>
            </form>
        </section>
    </div>
    <script src="system_info.js"></script>
    <script src="config_manager.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
